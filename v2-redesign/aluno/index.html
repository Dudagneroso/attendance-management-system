<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="profile-header">
            <img src="profile-picture.jpg" alt="Profile Picture" class="profile-img">
            <div class="profile-info">
                <h1>Ana Luíza De Souza</h1>
                <p>Ger. Comercial</p>
            </div>
        </header>

        <div class="content">
            <section class="table-section">
                <div class="table-header">
                    <h2>Meta Atual</h2>
                    <select>
                        <option selected disabled>Por Colaborador</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Status</th>
                            <th>Valor</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>João Carlos</td>
                            <td>Ativo</td>
                            <td>R$ 15.000</td>
                            <td>08/2024</td>
                        </tr>
                        <!-- Add more rows as needed -->
                    </tbody>
                </table>
            </section>

            <section class="table-section">
                <div class="table-header">
                    <h2>Outras Metas</h2>
                    <select>
                        <option selected disabled>Por Período</option>
                    </select>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Status</th>
                            <th>Valor</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>Maria Eduarda</td>
                            <td>Inativo</td>
                            <td>R$ 10.000</td>
                            <td>07/2024</td>
                        </tr>
                        <!-- Add more rows as needed -->
                    </tbody>
                </table>
            </section>
        </div>
        
        <footer class="footer">
            <img src="logo.png" alt="Logo" class="logo">
        </footer>
    </div>
</body>
</html>
